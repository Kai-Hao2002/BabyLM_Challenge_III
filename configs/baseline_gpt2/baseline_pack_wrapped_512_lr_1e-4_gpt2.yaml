output_dir: outputs/16k_baseline_gpt2_10M/baseline_pack_wrapped_512_lr_1e-4_gpt2
seed: 42
mode: baseline

tokenizer_path: tokenizers/tokenizer_10M_16k.json

data_args:
  use_packing: true
  packing_strategy: wrapped
  objective: causal_lm
  insert_eos: true
  train_path: data/processed_10M/vocab_16k/Baseline_Naive/train
  val_path: data/global_validation

model_args:
  model_type: gpt2
  n_embd: 256
  n_layer: 4
  n_head: 4
  n_inner: 1024
  n_positions: 512
  n_ctx: 512
  pad_token_id: 3
  bos_token_id: 1
  eos_token_id: 2

training_args:
  batch_size: 4
  max_length: 512
  learning_rate: 0.0001
  max_epochs: 1
  max_steps:
  eval_every_steps: 100
  max_val_steps: 20
  max_adjusted_token_exposure: 10000000
  checkpoint_interval_tokens: 1000000
  save_intermediate_checkpoints: false
