output_dir: outputs/lrz_debug_gpt2_pack_wrapped_128
seed: 42
mode: baseline

tokenizer_path: tokenizers/tokenizer_10M_baseline.json

data_args:
  use_packing: true
  packing_strategy: wrapped
  objective: causal_lm
  insert_eos: true
  train_path: data/processed_10M/Stage_Baseline/train
  val_path: data/processed_10M/Stage_Baseline/validation

model_args:
  model_type: gpt2
  n_embd: 256
  n_layer: 4
  n_head: 4
  n_inner: 1024
  n_positions: 128
  n_ctx: 128
  pad_token_id: 3
  bos_token_id: 1
  eos_token_id: 2

training_args:
  batch_size: 2
  max_length: 128
  mlm_probability: 0.15
  learning_rate: 0.0001
  max_epochs: 1
  max_steps: 5
  eval_every_steps: 2
  max_val_steps: 1
  max_adjusted_token_exposure: 10000000
