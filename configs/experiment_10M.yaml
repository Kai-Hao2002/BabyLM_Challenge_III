output_dir: outputs/baseline_10M_lr_3e-4
seed: 42
mode: baseline

tokenizer_path: tokenizers/tokenizer_10M_16k.json

data_args:
  train_path: data/processed_10M/vocab_16k/Baseline_Naive/train
  val_path: data/processed_10M/vocab_16k/Baseline_Naive/validation

model_args:
  model_type: bert
  hidden_size: 256
  num_hidden_layers: 4
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 512
  pad_token_id: 3
  type_vocab_size: 2

training_args:
  batch_size: 4
  max_length: 128
  mlm_probability: 0.15
  learning_rate: 0.0003
  max_epochs: 10
  max_steps: 
  eval_every_steps: 100
  max_val_steps: 20
  max_adjusted_token_exposure: 10000000
  checkpoint_interval_tokens: 1000000