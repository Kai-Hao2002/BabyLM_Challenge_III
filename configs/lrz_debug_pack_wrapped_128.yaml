output_dir: outputs/lrz_debug_pack_wrapped_128
seed: 42
mode: baseline

tokenizer_path: tokenizers/tokenizer_10M_16k.json

data_args:
  use_packing: true
  packing_strategy: wrapped
  train_path: data/processed_10M/vocab_16k/Baseline_Naive/train
  val_path: data/processed_10M/vocab_16k/Baseline_Naive/validation

model_args:
  hidden_size: 256
  num_hidden_layers: 4
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 512
  pad_token_id: 3

training_args:
  batch_size: 2
  max_length: 128
  mlm_probability: 0.15
  learning_rate: 0.0001
  max_epochs: 1
  max_steps: 5
  eval_every_steps: 2
  max_val_steps: 1
  max_adjusted_token_exposure: 10000000
  checkpoint_interval_tokens: 1000000
