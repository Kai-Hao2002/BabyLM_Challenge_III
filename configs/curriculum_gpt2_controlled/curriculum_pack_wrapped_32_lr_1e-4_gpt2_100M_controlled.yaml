output_dir: outputs/curriculum_pack_wrapped_gpt2_100M_controlled/curriculum_pack_wrapped_32_lr_1e-4_gpt2_100M_controlled
seed: 42
mode: curriculum

tokenizer_path: tokenizers/tokenizer_100M_32k.json

data_args:
  use_packing: true
  packing_strategy: wrapped
  objective: causal_lm
  insert_eos: true
  validation_path: data/global_validation
  curriculum_stages:
    - name: stage_1_foundation
      train_path: data/processed_100M/vocab_32k/Stage_1_Foundation/train
      target_adjusted_tokens: 30000000
      checkpoint_name: stage_1_30M
    - name: stage_2_alignment
      train_path: data/processed_100M/vocab_32k/Stage_2_Alignment/train
      target_adjusted_tokens: 60000000
      checkpoint_name: stage_2_60M
    - name: stage_3_hardboosting
      train_path: data/processed_100M/vocab_32k/Stage_3_HardBoosting/train
      target_adjusted_tokens: 100000000
      checkpoint_name: final_100M

model_args:
  model_type: gpt2
  n_embd: 256
  n_layer: 4
  n_head: 4
  n_inner: 1024
  n_positions: 512
  n_ctx: 512
  pad_token_id: 3
  bos_token_id: 1
  eos_token_id: 2

training_args:
  batch_size: 4
  max_length: 32
  gradient_accumulation_steps: 16
  target_effective_tokens_per_update: 2048
  learning_rate: 0.0001
  max_epochs: 10
  max_steps:
  eval_every_steps: 1000
  max_val_steps: 20
  max_adjusted_token_exposure: 100000000
  checkpoint_interval_tokens: 10000000
  save_intermediate_checkpoints: false
