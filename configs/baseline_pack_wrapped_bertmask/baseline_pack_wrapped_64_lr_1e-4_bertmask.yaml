output_dir: outputs/18k_baseline_pack_wrapped_10M/baseline_pack_wrapped_64_lr_1e-4
seed: 42
mode: baseline

tokenizer_path: tokenizers/tokenizer_10M_18k.json

data_args:
  use_packing: true
  packing_strategy: wrapped
  train_path: data/processed_10M/vocab_18k/Baseline_Naive/train
  val_path: data/global_validation

model_args:
  model_type: bert
  hidden_size: 256
  num_hidden_layers: 4
  num_attention_heads: 4
  intermediate_size: 1024
  max_position_embeddings: 512
  pad_token_id: 3
  type_vocab_size: 2

training_args:
  batch_size: 4
  max_length: 64
  mlm_probability: 0.15
  learning_rate: 0.0001
  max_epochs: 1
  max_steps: 
  eval_every_steps: 100
  max_val_steps: 20
  max_adjusted_token_exposure: 10000000
  checkpoint_interval_tokens: 1000000
  save_intermediate_checkpoints: false
